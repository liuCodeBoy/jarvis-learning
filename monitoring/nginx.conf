# Optional HTTP reverse proxy. Terminate TLS in a managed ingress or provide a
# separate site configuration with real certificates.
events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream jarvis_core {
        server jarvis-core:8000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 64k;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;

        location / {
            proxy_pass http://jarvis_core;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 130s;
        }

        location = /health {
            proxy_pass http://jarvis_core/health;
            access_log off;
        }
    }
}
