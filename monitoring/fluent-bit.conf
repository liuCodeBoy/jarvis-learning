# Optional local log forwarder. Mount ./logs at /var/log/jarvis when enabled.
[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info

[INPUT]
    Name          tail
    Path          /var/log/jarvis/*.log
    Tag           jarvis.*
    Read_from_Head Off
    Mem_Buf_Limit 10MB
    Skip_Long_Lines On

[FILTER]
    Name          modify
    Match         jarvis.*
    Add           service jarvis

[OUTPUT]
    Name          stdout
    Match         jarvis.*
